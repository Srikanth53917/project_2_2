<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Market Prediction</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
            color: #00d4ff;
        }

        form {
            margin-top: 40px;
        }

        input {
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            width: 220px;
            font-size: 16px;
        }

        button {
            padding: 12px 25px;
            background: #00d4ff;
            border: none;
            border-radius: 10px;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00aacc;
        }

        .card {
            margin: 40px auto;
            padding: 30px;
            width: 400px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .positive { color: #00ff88; }
        .negative { color: #ff4c4c; }
        .neutral { color: #ffd700; }

        img {
            margin-top: 20px;
            border-radius: 10px;
        }

        /* Dropdown */
        #dropdown {
            width: 220px;
            margin: auto;
            background: rgba(0,0,0,0.9);
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }

        .dropdown-item {
            padding: 10px;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: #00d4ff;
            color: black;
        }
    </style>
</head>

<body>

<h1>📈 Stock Market Prediction Dashboard</h1>

<!-- ✅ FORM -->
<form method="POST" action="/">

    <!-- SEARCH BOX -->
    <input type="text" id="searchBox" placeholder="Search Company..." required>

    <!-- HIDDEN TICKER -->
    <input type="hidden" name="ticker" id="ticker">

    <!-- DROPDOWN -->
    <div id="dropdown"></div>

    <br>

    <input type="number" name="start_year" placeholder="Start Year" required>
    <input type="number" name="end_year" placeholder="End Year" required>

    <br>
    <button type="submit">Analyze</button>

</form>

<!-- ✅ RESULT -->
{% if result %}
<div class="card">
    <h2>{{ result.company }}</h2>

    <p><strong>Last Price:</strong> {{ result.last_price }}</p>
    <p><strong>Predicted Price:</strong> {{ result.predicted_price }}</p>

    <p class="{{ result.sentiment_class }}">
        <strong>Sentiment:</strong> {{ result.sentiment }}
    </p>

    <h3>Recommendation: {{ result.decision }}</h3>
</div>

<!-- ✅ CHARTS -->
<div>
    <h2>Stock Price Chart</h2>
    <img src="/static/stock_chart.png" width="500">

    <h2>Sentiment Analysis Chart</h2>
    <img src="/static/sentiment_chart.png" width="500">
</div>
{% endif %}

const searchBox = document.getElementById("searchBox");
const dropdown = document.getElementById("dropdown");
const tickerInput = document.getElementById("ticker");

searchBox.addEventListener("input", function () {
    let value = this.value.toLowerCase();
    dropdown.innerHTML = "";

    if (value === "") {
        dropdown.style.display = "none";
        return;
    }

    let filtered = companies.filter(c =>
        c.name.toLowerCase().includes(value) ||
        c.ticker.toLowerCase().includes(value)
    );

    filtered.forEach(c => {
        let div = document.createElement("div");
        div.classList.add("dropdown-item");
        div.innerHTML = c.name + " (" + c.ticker + ")";

        div.onclick = function () {
            searchBox.value = c.name;
            tickerInput.value = c.ticker;
            dropdown.style.display = "none";
        };

        dropdown.appendChild(div);
    });

    dropdown.style.display = "block";
});
</script>

</html>
